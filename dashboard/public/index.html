<!DOCTYPE html>
<html>
<head>
  <title>UniChat Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      padding: 8px 12px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>UniChat Dashboard</h1>
<div id="guilds"></div>

<script>
async function loadGuilds() {
  const res = await fetch('/api/guilds');
  const data = await res.json();

  const container = document.getElementById('guilds');
  container.innerHTML = '';

  data.guilds.forEach(g => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h3>${g.name}</h3>
      <p>Members: ${g.memberCount}</p>
      <p>Premium: ${g.premium ? '✅' : '❌'}</p>
      <p>Setup: ${g.setup ? '✅' : '❌'}</p>
      <button onclick="alert('Extend coming next')">Extend</button>
      <button onclick="alert('Revoke coming next')">Revoke</button>
    `;

    container.appendChild(div);
  });
}

loadGuilds();
</script>

</body>
</html>
